<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>一束烛</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="bgLayer"></div>
<div id="bgOverlay"></div>

<!-- 设置面板 -->
<div id="settingsPanel" class="settings-panel">
  <div class="settings-header">
    <h2>⚙️ 设置</h2>
    <button class="close-settings" onclick="toggleSettings()">✕</button>
  </div>
  <div class="settings-content">
    <!-- 主题设置 -->
    <div class="settings-group">
      <label class="settings-label">🎨 主题色</label>
      <div class="color-picker">
        <button class="color-btn" data-color="#4CAF50" style="background: #4CAF50;" title="默认绿"></button>
        <button class="color-btn" data-color="#2196F3" style="background: #2196F3;" title="蓝色"></button>
        <button class="color-btn" data-color="#9C27B0" style="background: #9C27B0;" title="紫色"></button>
        <button class="color-btn" data-color="#FF6B6B" style="background: #FF6B6B;" title="红色"></button>
        <button class="color-btn" data-color="#FF9800" style="background: #FF9800;" title="橙色"></button>
        <button class="color-btn" data-color="#00BCD4" style="background: #00BCD4;" title="青色"></button>
      </div>
    </div>
    <!-- 背景模糊度 -->
    <div class="settings-group">
      <label class="settings-label">🌫️ 背景模糊度</label>
      <input type="range" id="blurSlider" min="0" max="20" value="3" class="slider">
      <span id="blurValue">3px</span>
    </div>
    <!-- 卡片行数 -->
    <div class="settings-group">
      <label class="settings-label">📊 卡片每行数量</label>
      <input type="range" id="colsSlider" min="2" max="12" value="8" class="slider">
      <span id="colsValue">8 列</span>
    </div>
    <!-- 透明度 -->
    <div class="settings-group">
      <label class="settings-label">💫 玻璃态透明度</label>
      <input type="range" id="opacitySlider" min="20" max="80" value="45" class="slider">
      <span id="opacityValue">45%</span>
    </div>
    <!-- 页面与导航风格 -->
    <div class="settings-group">
      <div class="settings-group-title">
        <span>✨ 页面与导航风格</span>
        <span class="settings-note">更多个性化布局与品牌感</span>
      </div>
      <div class="settings-row">
        <label class="settings-input-label" for="pageTitle">页面标题</label>
        <input type="text" id="pageTitle" class="settings-input" placeholder="一束烛" />
      </div>
      <div class="settings-row">
        <label class="settings-input-label" for="pageSubtitle">页面副标题</label>
        <input type="text" id="pageSubtitle" class="settings-input" placeholder="余香何须道，一善一清风。" />
      </div>
      <div class="settings-row">
        <label class="settings-checkbox-label"><input type="checkbox" id="showSearchTabs" /> 显示搜索分类</label>
      </div>
      <div class="settings-row">
        <label class="settings-label" for="navRadiusSelect">导航按钮形态</label>
        <select id="navRadiusSelect" class="settings-input">
          <option value="soft">圆润柔和</option>
          <option value="sharp">稳重硬朗</option>
        </select>
      </div>
      <div class="settings-note">在“搜索”区之上保持简洁，在导航按钮上实现更精致的视觉层次。</div>
    </div>
    <!-- 搜索引擎管理 -->
    <div class="settings-group" id="engineSettingsGroup">
      <div class="settings-group-title">
        <span>🔎 自定义搜索引擎</span>
        <span class="settings-note">支持 {{query}} 或 %s 作为搜索关键词占位符。</span>
      </div>
      <div class="settings-row">
        <label class="settings-input-label" for="engineNameInput">名称</label>
        <input type="text" id="engineNameInput" class="settings-input" placeholder="搜索名称，例如 DuckDuckGo" />
      </div>
      <div class="settings-row">
        <label class="settings-input-label" for="engineIconInput">图标</label>
        <input type="text" id="engineIconInput" class="settings-input" placeholder="例如 🔎 或 D" />
      </div>
      <div class="settings-row">
        <label class="settings-input-label" for="engineUrlInput">搜索地址</label>
        <input type="url" id="engineUrlInput" class="settings-input" placeholder="https://duckduckgo.com/?q={{query}}" />
      </div>
      <div class="settings-row">
        <label class="settings-input-label" for="engineCategorySelect">分类</label>
        <select id="engineCategorySelect" class="settings-input">
          <option value="engine">引擎</option>
          <option value="community">社区</option>
          <option value="video">视频</option>
          <option value="music">音乐</option>
          <option value="life">生活</option>
          <option value="job">求职</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="settings-row">
        <button type="button" class="settings-btn" id="addSearchEngineBtn">＋ 添加搜索引擎</button>
      </div>
      <div id="customEngineList" class="custom-engine-list"></div>
    </div>
    <!-- 导出/导入 -->
    <div class="settings-group">
      <label class="settings-label">💾 备份</label>
      <div class="settings-buttons">
        <button class="settings-btn" onclick="exportSettings()">📥 导出设置</button>
        <button class="settings-btn" onclick="document.getElementById('importFile').click()">📤 导入设置</button>
        <input type="file" id="importFile" style="display:none;" accept=".json" onchange="importSettings()">
      </div>
    </div>
    <!-- 重置 -->
    <div class="settings-group">
      <button class="settings-btn reset-btn" onclick="resetSettings()">↻ 重置为默认</button>
    </div>
    <!-- 常用导航 设置（可视化管理） -->
    <div class="settings-group" id="favSettings">
      <label class="settings-label">⭐ 常用导航</label>
      <div class="fav-help">添加网址后会自动尝试获取网站图标；若需要，可上传自定义图标或输入自定义名称与底色。</div>
      <div class="fav-manager">
        <div class="fav-input-row">
          <label class="fav-center-toggle"><input type="checkbox" id="favEnabled" /> 在导航栏显示“常用”</label>
        </div>
        <div id="favListContainer" class="fav-list"></div>
        <div class="fav-input-row">
          <input type="url" id="favUrl" placeholder="https://example.com" />
          <input type="text" id="favName" placeholder="自定义名称（可选）" />
        </div>
        <div class="fav-input-row">
          <label class="fav-upload-label">上传图标<input type="file" id="favIconFile" accept="image/*" /></label>
          <input type="color" id="favBgColor" value="#2a2a2a" title="卡片底色" />
          <label class="fav-center-toggle"><input type="checkbox" id="favCenterText" checked /> 居中显示文字</label>
          <button class="settings-btn" id="addFavBtn">＋ 添加</button>
        </div>
        <div class="fav-action-row">
          <button class="settings-btn" id="saveFavBtn">💾 保存常用</button>
          <button class="settings-btn reset-btn" id="clearFavBtn">✕ 清空常用</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 添加搜索引擎弹窗 -->
<div id="addEngineModal" class="modal-overlay" aria-hidden="true" onclick="if (event.target === this) closeAddEngineModal()">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="addEngineModalTitle">
    <div class="modal-header">
      <div>
        <h2 id="addEngineModalTitle">添加搜索引擎</h2>
        <div class="modal-subtitle" id="addEngineModalSubtitle">最多添加8种，已添加0种</div>
      </div>
      <button class="modal-close" type="button" aria-label="关闭" onclick="closeAddEngineModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="engine-modal-list" id="modalEngineGrid"></div>
      <div class="engine-modal-footer">
        <input id="modalEngineInput" class="add-engine-input" type="text" placeholder="请输入搜索地址，用%s替代关键词，例： https://www.baidu.com/s?wd=%s" />
        <button id="modalEngineAddBtn" class="add-engine-submit" type="button">添加</button>
      </div>
    </div>
  </div>
</div>

<!-- 设置按钮 -->
<button class="settings-toggle" id="settingsToggle" onclick="toggleSettings()" title="打开设置">⚙️</button>

<div class="container">
  <!-- 头部 -->
  <div class="header-area">
    <span class="header-icon">🧭</span>
    <div>
      <h1>一束烛</h1>
      <p class="header-subtitle">余香何须道，一善一清风。</p>
    </div>
    <span class="header-icon">✦</span>
  </div>
  
  <!-- 搜索区域 -->
  <div class="search-area-divider"></div>
  <div class="search-wrapper">
    <!-- 分类 Tab -->
    <div class="search-tabs" id="searchTabs"></div>
    <!-- 搜索框 -->
    <div class="search-box">
      <button type="button" class="engine-trigger" id="engineTrigger" aria-label="切换搜索引擎" aria-haspopup="listbox" aria-expanded="false">
        <img id="search-engine-icon" src="" alt="搜索引擎图标">
        <span class="engine-name" id="engineName"></span>
        <span class="engine-arrow" id="engineArrow">▾</span>
      </button>
      <div class="search-divider"></div>
      <input type="text" id="searchInput" placeholder="搜索网页 / 定位站内网站" autocomplete="off" oninput="filterLinks()" />
      <button type="button" class="clear-btn" id="clearBtn" aria-label="清空" style="display:none;" onclick="clearSearch()">✕</button>
      <button type="button" class="search-submit-btn" onclick="doSearch()" aria-label="搜索">🔍</button>
    </div>
  </div>

  <!-- 导航分类栏 -->
  <div class="nav-bar">
    <div class="nav-scroll" id="navScroll">
      <button class="nav-btn active" data-section="all" onclick="filterBySection('all')">🌐 全部</button>
    </div>
  </div>

  <!-- 链接分区（由 main.js 动态渲染） -->
  <div id="main-content"></div>
</div>
<div class="engine-list" id="enginePanel"></div>
<script src="main.js"></script>
</body>
</html>
